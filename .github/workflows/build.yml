name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      # ubuntu-latest ships with several GB of preinstalled toolchains we
      # never touch (.NET, Haskell, Swift, CodeQL) - removing them before
      # the Android SDK/Gradle download anything is the standard fix for
      # "No space left on device" on GitHub-hosted Android CI runners.
      # `rm -rf` on a path that doesn't exist on a given runner image is a
      # silent no-op, not an error, so this is safe even if some of these
      # move or disappear in a future image update.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contentguard-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          # These are debug builds you download and install right after
          # each run, not something needing long-term retention - the
          # default 90-day retention meant every push's APK piled up
          # against the account's Actions artifact storage quota until it
          # got fully hit ("Failed to CreateArtifact: Artifact storage
          # quota has been hit"). A short retention lets old ones expire
          # and free that quota automatically instead of accumulating.
          retention-days: 1
