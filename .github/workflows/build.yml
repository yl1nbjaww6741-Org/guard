name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed to create/update the rolling release + upload its asset below -
# without this, some default token permission setups reject the release
# API calls with a 403.
permissions:
  contents: write

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      # ubuntu-latest ships with several GB of preinstalled toolchains we
      # never touch (.NET, Haskell, Swift, CodeQL) - removing them before
      # the Android SDK/Gradle download anything is the standard fix for
      # "No space left on device" on GitHub-hosted Android CI runners.
      # `rm -rf` on a path that doesn't exist on a given runner image is a
      # silent no-op, not an error, so this is safe even if some of these
      # move or disappear in a future image update.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Publishes to a single rolling "latest-debug" GitHub Release instead
      # of an Actions artifact. Release assets are billed against the
      # repo's normal storage, not the separate Actions artifact storage
      # quota - the previous actions/upload-artifact step kept failing with
      # "Failed to CreateArtifact: Artifact storage quota has been hit"
      # once enough debug builds (each run's APK) piled up against that
      # quota, even with a short retention-days set. This sidesteps that
      # quota entirely rather than continuing to manage around it.
      #
      # Uses the `gh` CLI (preinstalled on GitHub-hosted runners, already
      # authenticated via GITHUB_TOKEN) directly instead of a third-party
      # release action, matching this workflow's existing preference for
      # official/well-known actions only. One tag/release ("latest-debug")
      # is created once and its asset is replaced (--clobber) on every
      # run, so there's a single stable URL to bookmark rather than a new
      # release cluttering the list on every push.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          TAG="latest-debug"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "ContentGuard debug build (rolling)" \
              --notes "Automated debug build - always reflects the latest push to main, not a versioned release." \
              --prerelease
          fi
          gh release upload "$TAG" "$APK_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
            --notes "Automated debug build from commit ${GITHUB_SHA} - always reflects the latest push to main, not a versioned release."
